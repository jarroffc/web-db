<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Whitelist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan CSS kecil untuk hide/show section */
        #dashboard-section { display: none; }
        .auth-box { max-width: 400px; margin: 15vh auto; text-align: center; }
    </style>
</head>
<body>
    
    <div class="container" id="auth-section">
        <div class="card auth-box">
            <h1>Panel Whitelist</h1>
            <p>Masukkan API Key untuk mengakses database.</p>
            <form id="authForm">
                <input type="password" id="inputApiKey" placeholder="Masukkan API Key..." required>
                <button type="submit" id="btnAuth">Akses Panel</button>
            </form>
        </div>
    </div>

    <div class="container" id="dashboard-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Dashboard Whitelist</h1>
            <button onclick="logout()" style="background:#ff6b6b; width: auto; padding: 10px 20px;">Keluar</button>
        </div>
        
        <div class="flex-row">
            <div class="card w-50">
                <h2>Tambah Nomor</h2>
                <form id="addForm">
                    <input type="text" id="waNumber" placeholder="Contoh: 6285876485652" required>
                    <button type="submit" id="btnSubmit">Tambah ke Whitelist</button>
                </form>
            </div>

            <div class="card w-50 text-center" style="display:flex; flex-direction:column; justify-content:center;">
                <h2>Total Terdaftar</h2>
                <h1 id="totalCount" style="font-size: 4rem; color: var(--primary-blue); margin: 0;">0</h1>
            </div>
        </div>

        <div class="card">
            <h2>Daftar Nomor Aktif</h2>
            <ul id="numberList" class="list-group">
                <li class="list-item">Memuat data...</li>
            </ul>
        </div>
    </div>

    <script>
        // Logika Frontend
        let currentApiKey = localStorage.getItem('API_KEY') || '';

        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-section');

        // Cek API Key saat pertama buka web
        if(currentApiKey) {
            verifyApiKey(currentApiKey);
        }

        // Form Submit API Key
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const key = document.getElementById('inputApiKey').value;
            document.getElementById('btnAuth').innerText = "Mengecek...";
            await verifyApiKey(key);
            document.getElementById('btnAuth').innerText = "Akses Panel";
        });

        // Fungsi Validasi API Key ke Server
        async function verifyApiKey(key) {
            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'x-api-key': key }
                });
                if(res.ok) {
                    currentApiKey = key;
                    localStorage.setItem('API_KEY', key);
                    authSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    fetchNumbers(); // Langsung load data
                } else {
                    alert("API Key Salah!");
                    logout();
                }
            } catch (err) {
                alert("Gagal koneksi ke server.");
            }
        }

        // Fungsi Load Data Nomor
        async function fetchNumbers() {
            try {
                const res = await fetch('/api/numbers', {
                    headers: { 'x-api-key': currentApiKey }
                });
                
                if(res.status === 401) return logout();
                
                const data = await res.json();
                const list = document.getElementById('numberList');
                document.getElementById('totalCount').innerText = data.numbers.length;
                
                list.innerHTML = '';
                if(data.numbers.length === 0) list.innerHTML = '<i>Belum ada nomor terdaftar</i>';
                
                data.numbers.forEach((num, index) => {
                    list.innerHTML += `
                        <li class="list-item">
                            <span>${index + 1}. ${num}</span>
                            <button class="delete-btn" onclick="deleteNumber('${num}')">Hapus</button>
                        </li>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Fungsi Tambah Nomor
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const num = document.getElementById('waNumber').value;
            const btn = document.getElementById('btnSubmit');

            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            const res = await fetch('/api/numbers', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-api-key': currentApiKey 
                },
                body: JSON.stringify({ number: num })
            });
            const data = await res.json();
            
            if(res.ok) {
                alert(data.message);
                document.getElementById('waNumber').value = '';
                fetchNumbers();
            } else {
                alert(data.error);
            }
            btn.innerText = "Tambah ke Whitelist";
            btn.disabled = false;
        });

        // Fungsi Hapus Nomor
        async function deleteNumber(num) {
            if(!confirm(`Hapus nomor ${num} dari whitelist?`)) return;
            
            const res = await fetch(`/api/numbers/${num}`, { 
                method: 'DELETE', 
                headers: { 'x-api-key': currentApiKey } 
            });
            const data = await res.json();
            
            if(res.ok) {
                fetchNumbers();
            } else {
                alert(data.error);
            }
        }

        // Fungsi Logout / Reset API Key
        function logout() {
            localStorage.removeItem('API_KEY');
            currentApiKey = '';
            authSection.style.display = 'block';
            dashboardSection.style.display = 'none';
            document.getElementById('inputApiKey').value = '';
        }
    </script>
</body>
</html>
